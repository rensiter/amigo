<!DOCTYPE html>
<html lang="hi" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AMIGOPEDIA — Player</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d0d14;--bg2:#13131f;--bg3:#1a1a2e;
  --card:#16162a;--card2:#1e1e35;--border:#2a2a45;
  --accent:#6c63ff;--accent2:#a78bfa;--accent3:#f472b6;
  --text:#e8e8f0;--text2:#a0a0c0;--text3:#6060a0;
  --success:#34d399;--warn:#fbbf24;
}
[data-theme="light"]{
  --bg:#f0f0ff;--bg2:#e8e8ff;--bg3:#dcdcff;
  --card:#ffffff;--card2:#f5f5ff;--border:#c8c8e8;
  --text:#1a1a3e;--text2:#4a4a7a;--text3:#8888aa;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;}

nav{
  position:sticky;top:0;z-index:100;
  background:rgba(13,13,20,0.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 20px;height:60px;
  display:flex;align-items:center;gap:12px;
}
.back-btn{
  width:36px;height:36px;border-radius:10px;
  background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1rem;text-decoration:none;color:var(--text);
  transition:all 0.2s;
}
.back-btn:hover{background:var(--accent);border-color:var(--accent);}
.nav-info{flex:1;}
.nav-info .title{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:1rem;}
.nav-info .subtitle{font-size:0.75rem;color:var(--text3);}
.theme-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--card);border:1px solid var(--border);
  cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s;
}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 60px);}

/* SIDEBAR */
.sidebar{
  width:280px;flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--border);
  position:sticky;top:60px;height:calc(100vh - 60px);
  overflow-y:auto;padding:16px;
}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

.subject-header{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:16px;margin-bottom:16px;
}
.subject-header .icon{font-size:2rem;margin-bottom:8px;}
.subject-header .sname{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:1.1rem;}
.subject-header .teacher{font-size:0.8rem;color:var(--text3);margin-top:2px;}
.subject-header .sprogress{margin-top:12px;}
.subject-header .prog-bar{height:6px;background:var(--border);border-radius:6px;overflow:hidden;margin-top:6px;}
.subject-header .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:6px;transition:width 0.5s;}
.subject-header .prog-label{font-size:0.75rem;color:var(--text2);display:flex;justify-content:space-between;}

.chapter-item{margin-bottom:8px;}
.chapter-btn{
  width:100%;display:flex;align-items:center;gap:10px;
  background:none;border:none;color:var(--text);
  padding:10px 12px;border-radius:12px;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:700;font-size:0.85rem;
  transition:all 0.2s;text-align:left;
}
.chapter-btn:hover{background:var(--card);}
.chapter-btn.active{background:var(--card);color:var(--accent2);}
.chapter-btn .ch-icon{font-size:1rem;}
.chapter-btn .ch-name{flex:1;}
.chapter-btn .ch-count{font-size:0.75rem;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:8px;}
.chapter-btn .ch-arrow{font-size:0.7rem;color:var(--text3);transition:transform 0.2s;}
.chapter-btn.active .ch-arrow{transform:rotate(90deg);}

/* MAIN CONTENT */
.main{flex:1;padding:24px;max-width:900px;}

/* BREADCRUMB */
.breadcrumb{
  display:flex;align-items:center;gap:8px;
  font-size:0.8rem;color:var(--text3);margin-bottom:24px;flex-wrap:wrap;
}
.breadcrumb a{color:var(--accent2);text-decoration:none;}
.breadcrumb a:hover{text-decoration:underline;}
.breadcrumb .sep{color:var(--text3);}

/* CHAPTER HEADER */
.chapter-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:20px;gap:16px;flex-wrap:wrap;
}
.chapter-title-area .ch-title{
  font-family:'Baloo 2',sans-serif;font-weight:700;font-size:1.5rem;
}
.chapter-title-area .ch-meta{font-size:0.85rem;color:var(--text2);margin-top:4px;}
.chapter-badge{
  display:flex;align-items:center;gap:6px;
  background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);
  border-radius:12px;padding:8px 14px;
  color:var(--success);font-size:0.8rem;font-weight:700;white-space:nowrap;
}
.chapter-badge.incomplete{background:rgba(108,99,255,0.1);border-color:rgba(108,99,255,0.3);color:var(--accent2);}

/* LECTURE LIST */
.lectures-list{display:flex;flex-direction:column;gap:10px;}
.lec-item{
  display:flex;align-items:center;gap:14px;
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:14px 16px;
  cursor:pointer;transition:all 0.25s;
  text-decoration:none;color:inherit;
  position:relative;overflow:hidden;
}
.lec-item::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--accent),var(--accent3));
  border-radius:3px;opacity:0;transition:opacity 0.2s;
}
.lec-item:hover{border-color:var(--accent);transform:translateX(4px);}
.lec-item:hover::before{opacity:1;}
.lec-item.watched{border-color:rgba(52,211,153,0.3);}
.lec-item.watched::before{opacity:1;background:linear-gradient(180deg,var(--success),#06b6d4);}
.lec-num{
  width:44px;height:44px;border-radius:12px;
  background:var(--bg3);display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:0.85rem;color:var(--accent2);flex-shrink:0;
}
.lec-item.watched .lec-num{background:rgba(52,211,153,0.15);color:var(--success);}
.lec-info{flex:1;}
.lec-info .lec-title{font-weight:700;font-size:0.95rem;margin-bottom:2px;}
.lec-info .lec-meta{font-size:0.78rem;color:var(--text2);display:flex;align-items:center;gap:10px;}
.lec-info .lec-meta span{display:flex;align-items:center;gap:4px;}
.lec-actions{display:flex;align-items:center;gap:8px;}
.watch-badge{
  font-size:0.75rem;background:rgba(52,211,153,0.15);
  color:var(--success);border:1px solid rgba(52,211,153,0.3);
  border-radius:8px;padding:4px 10px;font-weight:700;white-space:nowrap;
}
.play-btn{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  display:flex;align-items:center;justify-content:center;
  font-size:0.9rem;flex-shrink:0;transition:transform 0.2s;
}
.play-btn:hover{transform:scale(1.1);}

/* PROGRESS OVERVIEW */
.chapter-progress{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:16px;margin-bottom:20px;
}
.cp-bar{flex:1;height:8px;background:var(--border);border-radius:8px;overflow:hidden;}
.cp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:8px;transition:width 0.5s;}
.cp-label{font-size:0.85rem;font-weight:700;color:var(--accent2);white-space:nowrap;}

/* MOBILE SIDEBAR TOGGLE */
.sidebar-toggle{
  display:none;
  position:fixed;bottom:20px;right:20px;z-index:200;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  border:none;cursor:pointer;font-size:1.3rem;color:#fff;
  box-shadow:0 4px 20px rgba(108,99,255,0.4);
}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty .e-icon{font-size:3rem;margin-bottom:12px;}
.empty p{font-size:0.9rem;}

@media(max-width:768px){
  .sidebar{
    position:fixed;left:-280px;top:60px;z-index:150;
    height:calc(100vh - 60px);transition:left 0.3s;
    box-shadow:4px 0 20px rgba(0,0,0,0.4);
  }
  .sidebar.open{left:0;}
  .main{padding:16px;}
  .sidebar-toggle{display:flex;align-items:center;justify-content:center;}
  .layout{display:block;}
}
</style>
</head>
<body>
<nav>
  <a class="back-btn" href="index.html">←</a>
  <div class="nav-info">
    <div class="title" id="navTitle">Loading...</div>
    <div class="subtitle" id="navSubtitle">AMIGOPEDIA</div>
  </div>
  <button class="theme-btn" onclick="toggleTheme()">🌙</button>
</nav>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="subject-header">
      <div class="icon" id="sideIcon">📚</div>
      <div class="sname" id="sideName">Loading...</div>
      <div class="teacher" id="sideTeacher">👨‍🏫 —</div>
      <div class="sprogress">
        <div class="prog-label">
          <span>Progress</span>
          <span id="sideProgPct">0%</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" id="sideProgFill" style="width:0%"></div></div>
      </div>
    </div>
    <div id="chapterList"><!-- chapters --></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div id="chapterContent">
      <div class="empty"><div class="e-icon">👈</div><p>Baaye se chapter chuniye</p></div>
    </div>
  </div>
</div>

<button class="sidebar-toggle" id="sideToggle" onclick="toggleSidebar()">☰</button>

<script>
const BACKEND = 'https://amigopedia.up.railway.app';
const DATA_URL = 'data.json';

const ICONS = {
  'physics':'⚛️','chemistry':'🧪','maths':'📐','math':'📐',
  'biology':'🧬','english':'📖','hindi':'📝','history':'🏛️',
  'geography':'🌍','computer':'💻','science':'🔬',
  'economics':'📊','default':'📚'
};

let progress = JSON.parse(localStorage.getItem('ap_progress') || '{}');
let history = JSON.parse(localStorage.getItem('ap_history') || '[]');
let contentData = {};
let batch, subject, subjectData;
let activeChapter = null;

// Parse URL
const params = new URLSearchParams(location.search);
batch = decodeURIComponent(params.get('batch') || '');
subject = decodeURIComponent(params.get('subject') || '');

window.onload = async () => {
  await loadContent();
  setupPage();
};

async function loadContent() {
  try {
    const res = await fetch(DATA_URL);
    contentData = await res.json();
  } catch {
    try {
      const res = await fetch(`${BACKEND}/content`);
      contentData = await res.json();
    } catch { contentData = getDemoData(); }
  }
}

function getDemoData(){return{batches:{"SIGMA 8.0":{subjects:{"Physics":{teacher:"Alakh Pandey",chapters:{"Mechanics":{lectures:[{lec_no:"L-01",title:"Newton's Laws of Motion",video_id:1001,notes_id:1,duration:"45:20"},{lec_no:"L-02",title:"Work Energy Theorem",video_id:1002,notes_id:2,duration:"52:10"},{lec_no:"L-03",title:"Conservation of Momentum",video_id:1003,notes_id:3,duration:"38:45"}]},"Thermodynamics":{lectures:[{lec_no:"L-01",title:"Zeroth & First Law",video_id:1004,notes_id:4,duration:"48:00"},{lec_no:"L-02",title:"Heat Engines & Carnot Cycle",video_id:1005,notes_id:5,duration:"55:30"}]},"Electrostatics":{lectures:[{lec_no:"L-01",title:"Coulomb's Law",video_id:1006,notes_id:6,duration:"40:15"}]}}},"Chemistry":{teacher:"Pradeep Dahiya",chapters:{"Organic Chemistry":{lectures:[{lec_no:"L-01",title:"Basics of Organic Chemistry",video_id:2001,notes_id:7,duration:"60:00"},{lec_no:"L-02",title:"Hydrocarbons",video_id:2002,notes_id:8,duration:"55:00"}]}}}}}}};}

function setupPage() {
  subjectData = contentData.batches?.[batch]?.subjects?.[subject];
  if(!subjectData) { document.getElementById('navTitle').textContent = 'Data nahi mila'; return; }

  document.title = `${subject} — AMIGOPEDIA`;
  document.getElementById('navTitle').textContent = subject;
  document.getElementById('navSubtitle').textContent = batch;

  const icon = ICONS[subject.toLowerCase()] || ICONS['default'];
  document.getElementById('sideIcon').textContent = icon;
  document.getElementById('sideName').textContent = subject;
  document.getElementById('sideTeacher').textContent = `👨‍🏫 ${subjectData.teacher||'Teacher'}`;

  // Calc overall progress
  const prog = calcSubjectProgress();
  document.getElementById('sideProgPct').textContent = Math.round(prog) + '%';
  document.getElementById('sideProgFill').style.width = prog + '%';

  // Render chapters
  const chapters = Object.keys(subjectData.chapters || {});
  const chList = document.getElementById('chapterList');
  chList.innerHTML = chapters.map((ch, i) => {
    const lecs = subjectData.chapters[ch].lectures || [];
    const watched = lecs.filter(l => progress[l.video_id] >= 80).length;
    const complete = watched === lecs.length && lecs.length > 0;
    return `
    <div class="chapter-item">
      <button class="chapter-btn ${i===0?'active':''}" onclick="selectChapter('${encodeURIComponent(ch)}',this)">
        <span class="ch-icon">${complete?'✅':'📖'}</span>
        <span class="ch-name">${ch}</span>
        <span class="ch-count">${lecs.length}</span>
        <span class="ch-arrow">▶</span>
      </button>
    </div>`;
  }).join('');

  // Select first chapter
  if(chapters.length) selectChapterDirect(chapters[0]);

  // Breadcrumb
  document.getElementById('breadcrumb').innerHTML = `
    <a href="index.html">🏠 Home</a>
    <span class="sep">›</span>
    <a href="index.html">${batch}</a>
    <span class="sep">›</span>
    <span>${subject}</span>`;
}

function selectChapter(encCh, el) {
  document.querySelectorAll('.chapter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const ch = decodeURIComponent(encCh);
  selectChapterDirect(ch);
  // Mobile: close sidebar
  document.getElementById('sidebar').classList.remove('open');
}

function selectChapterDirect(ch) {
  activeChapter = ch;
  const chData = subjectData.chapters[ch];
  if(!chData) return;
  const lecs = chData.lectures || [];
  const watched = lecs.filter(l => progress[l.video_id] >= 80).length;
  const progPct = lecs.length ? (watched/lecs.length)*100 : 0;
  const complete = watched === lecs.length && lecs.length > 0;

  document.getElementById('chapterContent').innerHTML = `
    <div class="chapter-header">
      <div class="chapter-title-area">
        <div class="ch-title">📖 ${ch}</div>
        <div class="ch-meta">${lecs.length} lectures · ${watched} watched</div>
      </div>
      <div class="chapter-badge ${complete?'':'incomplete'}">
        ${complete ? '✅ Completed' : `📊 ${Math.round(progPct)}% Done`}
      </div>
    </div>
    <div class="chapter-progress">
      <div class="cp-bar"><div class="cp-fill" style="width:${progPct}%"></div></div>
      <div class="cp-label">${watched}/${lecs.length}</div>
    </div>
    <div class="lectures-list">
      ${lecs.map((lec,i) => {
        const isWatched = progress[lec.video_id] >= 80;
        const videoUrl = `video.html?id=${lec.video_id}&batch=${encodeURIComponent(batch)}&subject=${encodeURIComponent(subject)}&chapter=${encodeURIComponent(ch)}&title=${encodeURIComponent(lec.title)}&lec=${encodeURIComponent(lec.lec_no)}&notes=${lec.notes_id||''}&total=${lecs.length}&idx=${i}`;
        return `
        <a class="lec-item ${isWatched?'watched':''}" href="${videoUrl}" onclick="saveHistory(${lec.video_id},'${escapeQ(lec.title)}')">
          <div class="lec-num">${isWatched ? '✓' : lec.lec_no || (i+1)}</div>
          <div class="lec-info">
            <div class="lec-title">${lec.title}</div>
            <div class="lec-meta">
              ${lec.duration ? `<span>⏱ ${lec.duration}</span>` : ''}
              ${lec.notes_id ? `<span>📎 Notes</span>` : ''}
            </div>
          </div>
          <div class="lec-actions">
            ${isWatched ? '<div class="watch-badge">✓ Watched</div>' : ''}
            <div class="play-btn">▶</div>
          </div>
        </a>`;
      }).join('')}
    </div>`;
}

function calcSubjectProgress() {
  let total=0, watched=0;
  Object.values(subjectData?.chapters||{}).forEach(ch => {
    (ch.lectures||[]).forEach(l => { total++; if(progress[l.video_id] >= 80) watched++; });
  });
  return total ? (watched/total)*100 : 0;
}

function saveHistory(videoId, title) {
  const entry = {videoId, title, batch, subject, timestamp: Date.now()};
  history = history.filter(h => h.videoId !== videoId);
  history.unshift(entry);
  if(history.length > 10) history = history.slice(0,10);
  localStorage.setItem('ap_history', JSON.stringify(history));
}

function escapeQ(s) { return s.replace(/'/g, "\\'"); }

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.querySelector('.theme-btn').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('ap_theme', isDark ? 'light' : 'dark');
}

const savedTheme = localStorage.getItem('ap_theme');
if(savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
</script>
</body>
</html>
